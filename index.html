<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق دِين - الأكاديمية الذكية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #0b0f19; --card-bg: #161b22; --accent: #c5a059; --text: #e6edf3;
            --gold-gradient: linear-gradient(45deg, #c5a059, #f9e2af);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        
        /* تأثيرات بصرية مشوقة */
        .glass-card { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(10px); border-radius: 25px; padding: 20px; margin: 15px; border: 1px solid rgba(197, 160, 89, 0.2); transition: var(--transition); }
        .glass-card:hover { transform: translateY(-5px); border-color: var(--accent); }

        /* شاشة الفتح */
        #splash { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader { width: 50px; height: 50px; border: 3px solid var(--accent); border-top-color: transparent; border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* أوقات الصلاة الحية */
        .prayer-bar { display: flex; overflow-x: auto; gap: 10px; padding: 10px; scrollbar-width: none; }
        .p-item { min-width: 80px; padding: 10px; background: var(--card-bg); border-radius: 15px; text-align: center; border: 1px solid transparent; }
        .p-item.active { border-color: var(--accent); background: var(--gold-gradient); color: #000; font-weight: bold; }

        /* نظام طلب العلم (Levels) */
        .level-badge { background: var(--gold-gradient); color: #000; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 10px; display: inline-block; }
        .book-item { display: flex; align-items: center; gap: 15px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 15px; margin-top: 10px; }
        
        /* قائمة الذكاء الاصطناعي */
        .ai-category { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .cat-btn { padding: 15px; background: var(--card-bg); border: 1px solid rgba(197, 160, 89, 0.3); border-radius: 15px; color: var(--text); cursor: pointer; text-align: center; font-size: 14px; }
        .cat-btn.selected { background: var(--accent); color: white; }

        /* الدردشة */
        .chat-area { height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 10px; border-radius: 15px; background: rgba(0,0,0,0.2); }
        .m { padding: 10px 15px; border-radius: 15px; max-width: 85%; font-size: 14px; line-height: 1.5; }
        .m.bot { background: #21262d; align-self: flex-start; border-right: 3px solid var(--accent); }
        .m.user { background: var(--accent); color: white; align-self: flex-end; }

        .nav { position: fixed; bottom: 0; width: 100%; background: #161b22; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #30363d; }
        .nav i { font-size: 20px; color: #8b949e; cursor: pointer; }
        .nav i.active { color: var(--accent); }
    </style>
</head>
<body>

    <div id="splash">
        <i class="fas fa-mosque" style="font-size: 60px; color: var(--accent); margin-bottom: 20px;"></i>
        <div class="loader"></div>
    </div>

    <div id="main-content" style="display:none;">
        <header style="padding: 20px;">
            <div id="level-indicator" class="level-badge">مبتدئ في طلب العلم</div>
            <h2 id="current-p-name">وقت الذكر</h2>
            <div class="prayer-bar" id="p-list"></div>
        </header>

        <section id="tab-home" class="page">
            <div class="glass-card" style="text-align: center;">
                <h3>صلوات القضاء</h3>
                <div style="font-size: 48px; color: var(--accent); font-weight: 800;" id="q-count">0</div>
                <button onclick="changeQ(-1)" style="background: var(--gold-gradient); border:none; padding: 15px 30px; border-radius: 15px; font-weight: bold; margin-top: 10px;">تسجيل قضاء صلاة</button>
            </div>
        </section>

        <section id="tab-ai" class="page" style="display:none;">
            <div class="glass-card">
                <div class="ai-category">
                    <div class="cat-btn" onclick="setAICat('العقيدة', this)">العقيدة</div>
                    <div class="cat-btn" onclick="setAICat('الفقه', this)">الفقه</div>
                    <div class="cat-btn" onclick="setAICat('طلب العلم', this)">طلب العلم</div>
                    <div class="cat-btn" onclick="setAICat('رد الشبهات', this)">رد الشبهات</div>
                </div>
                <div class="chat-area" id="chat-v">
                    <div class="m bot">اختر تصنيفاً واسألني ما تشاء في علوم الشريعة.</div>
                </div>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <input type="text" id="ai-q" placeholder="اسأل المساعد الذكي..." style="flex:1; background:#0d1117; border:1px solid #30363d; color:white; padding:12px; border-radius:10px;">
                    <button onclick="askSmartAI()" style="background:var(--accent); border:none; padding:10px 20px; border-radius:10px;"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </section>

        <section id="tab-knowledge" class="page" style="display:none;">
            <div class="glass-card">
                <h3>رحلة طلب العلم</h3>
                <p style="font-size:12px; color:var(--muted);">أتمم قراءة الكتب وانتقل للمرحلة التالية</p>
                <div id="books-list">
                    </div>
                <button onclick="levelUp()" id="lvl-btn" style="width:100%; margin-top:15px; padding:12px; background:var(--success); color:white; border:none; border-radius:10px; display:none;">انتقال للمستوى الأعلى</button>
            </div>
        </section>

        <nav class="nav">
            <i class="fas fa-home active" onclick="nav('home', this)"></i>
            <i class="fas fa-book-open" onclick="nav('knowledge', this)"></i>
            <i class="fas fa-robot" onclick="nav('ai', this)"></i>
        </nav>
    </div>

    <script>
        // --- تهيئة Firebase ---
        const firebaseConfig = {
            apiKey: "AIzaSyDEab-wZCoMN7NPOprJfGTNfXihSPxxJIc",
            authDomain: "deen-5bf28.firebaseapp.com",
            projectId: "deen-5bf28",
            storageBucket: "deen-5bf28.firebasestorage.app",
            messagingSenderId: "540844424438",
            appId: "1:540844424438:web:6b2cdfefd0ca4ca83c80d7"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let qData = { missed: 0, level: 1, category: 'عام' };
        const levels = ["مبتدئ", "طالب علم ناشئ", "طالب علم متمرس", "عالم"];
        const library = [
            [], // 0
            ["الأصول الثلاثة", "كتاب التوحيد", "الأربعون النووية"], // المستوى 1
            ["المنظومة البيقونية", "متن أبي شجاع", "الآجرومية"], // المستوى 2
            ["فتح الباري", "سير أعلام النبلاء", "تفسير ابن كثير"] // المستوى 3
        ];

        // --- وظائف التشغيل ---
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                getLoc();
                updateKnowledge();
            }, 2500);
        };

        // نظام المستويات
        function updateKnowledge() {
            const badge = document.getElementById('level-indicator');
            badge.innerText = levels[qData.level - 1];
            const bList = document.getElementById('books-list');
            bList.innerHTML = library[qData.level] ? library[qData.level].map(b => `<div class="book-item"><i class="fas fa-book-reader" style="color:var(--accent)"></i> <span>${b}</span> <input type="checkbox" onchange="checkLvl()"></div>`).join('') : "وصلت لأعلى المستويات، نفع الله بك!";
        }

        function checkLvl() {
            const checks = document.querySelectorAll('#books-list input:checked');
            if(checks.length === library[qData.level].length) document.getElementById('lvl-btn').style.display = 'block';
        }

        function levelUp() {
            qData.level++;
            document.getElementById('lvl-btn').style.display = 'none';
            updateKnowledge();
            alert("مبارك! انتقلت لمستوى " + levels[qData.level-1]);
        }

        // الذكاء الاصطناعي
        let currentAICat = 'طلب العلم';
        function setAICat(c, el) {
            currentAICat = c;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
        }

        async function askSmartAI() {
            const q = document.getElementById('ai-q').value;
            const chat = document.getElementById('chat-v');
            if(!q) return;

            chat.innerHTML += `<div class="m user">${q}</div>`;
            document.getElementById('ai-q').value = '';

            // رابط OpenAI الحقيقي
            const apiKey = "ضع_مفتاح_OpenAI_هنا"; 
            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                    body: JSON.stringify({
                        model: "gpt-3.5-turbo",
                        messages: [{role: "system", content: `أنت عالم إسلامي متخصص في ${currentAICat}. أجب بدقة وأمانة علمية.`}, {role: "user", content: q}]
                    })
                });
                const data = await response.json();
                const reply = data.choices[0].message.content;
                chat.innerHTML += `<div class="m bot">${reply}</div>`;
            } catch (e) {
                chat.innerHTML += `<div class="m bot">عذراً، تأكد من ربط مفتاح API بشكل صحيح.</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }

        // أوقات الصلاة الجغرافية
        function getLoc() {
            navigator.geolocation.getCurrentPosition(pos => {
                fetch(`https://api.aladhan.com/v1/timings?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&method=4`)
                    .then(r => r.json()).then(d => {
                        const t = d.data.timings;
                        const p = { Fajr: "الفجر", Dhuhr: "الظهر", Asr: "العصر", Maghrib: "المغرب", Isha: "العشاء" };
                        const list = document.getElementById('p-list');
                        list.innerHTML = Object.keys(p).map(k => `<div class="p-item"><div>${p[k]}</div><div>${t[k]}</div></div>`).join('');
                    });
            });
        }

        function changeQ(v) {
            qData.missed += v;
            if(qData.missed < 0) qData.missed = 0;
            document.getElementById('q-count').innerText = qData.missed;
        }

        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById('tab-' + id).style.display = 'block';
            document.querySelectorAll('.nav i').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
