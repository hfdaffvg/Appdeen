<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية دِين - الإصدار الاحترافي V1.1</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

    <style>
        :root {
            --bg: #05080a; --card: #0f141a; --accent: #d4af37; --text: #f0f0f0;
            --gold-grad: linear-gradient(135deg, #d4af37 0%, #f9e2af 100%);
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 90px; }

        /* شاشة تسجيل الدخول المتعددة */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--card); padding: 30px; border-radius: 25px; border: 1px solid var(--accent); width: 100%; max-width: 400px; text-align: center; }
        .auth-btn { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .btn-google { background: #fff; color: #000; }
        .btn-fb { background: #1877f2; color: #fff; }
        .btn-git { background: #333; color: #fff; }
        .btn-tw { background: #1da1f2; color: #fff; }
        .btn-ms { background: #2f2f2f; color: #fff; }
        .btn-apple { background: #000; color: #fff; }

        /* التنسيق العام للتطبيق */
        .glass { background: var(--card); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 20px; padding: 20px; margin: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-gold { background: var(--gold-grad); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        
        #chat-v { height: 280px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 15px; padding: 15px; display: flex; flex-direction: column; gap: 10px; border: 1px solid #1e2530; margin-bottom: 10px; }
        .msg { padding: 12px; border-radius: 15px; max-width: 85%; font-size: 14px; }
        .msg.bot { background: #1a212c; align-self: flex-start; border-right: 3px solid var(--accent); }
        .msg.user { background: var(--accent); color: #000; align-self: flex-end; }

        .nav { position: fixed; bottom: 0; width: 100%; background: #0a0d14; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1e2533; }
        .nav i { color: #4b5563; font-size: 22px; cursor: pointer; }
        .nav i.active { color: var(--accent); }

        .logout-btn { color: #ff4d4d; font-size: 12px; cursor: pointer; margin-top: 10px; display: inline-block; }
    </style>
</head>
<body>

    <audio id="snd-click" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
    <audio id="snd-success" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

    <div id="auth-overlay">
        <div class="auth-card">
            <i class="fas fa-mosque" style="font-size: 40px; color: var(--accent); margin-bottom: 15px;"></i>
            <h2>تسجيل الدخول إلى دِين</h2>
            <button class="auth-btn btn-google" onclick="doLogin('google')"><i class="fab fa-google"></i> Google</button>
            <button class="auth-btn btn-fb" onclick="doLogin('fb')"><i class="fab fa-facebook"></i> Facebook</button>
            <button class="auth-btn btn-tw" onclick="doLogin('twitter')"><i class="fab fa-twitter"></i> Twitter</button>
            <button class="auth-btn btn-git" onclick="doLogin('github')"><i class="fab fa-github"></i> GitHub</button>
            <button class="auth-btn btn-ms" onclick="doLogin('microsoft')"><i class="fab fa-microsoft"></i> Microsoft</button>
            <button class="auth-btn btn-apple" onclick="doLogin('apple')"><i class="fab fa-apple"></i> Apple</button>
        </div>
    </div>

    <div id="app-main" style="display:none;">
        <header style="padding: 20px; text-align: center;">
            <div id="rank-name" style="color: var(--accent); font-weight: bold; font-size: 13px;">طالب مبتدئ</div>
            <h3 id="user-display">مرحباً بك</h3>
            <span class="logout-btn" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</span>
        </header>

        <div id="tab-learn" class="page">
            <div class="glass">
                <h3>📚 مسارك العلمي</h3>
                <div id="books-list"></div>
                <button id="quiz-btn" class="btn-gold" style="display:none;" onclick="openExam()">بدء الاختبار النهائي 📝</button>
            </div>
        </div>

        <div id="tab-ai" class="page" style="display:none;">
            <div class="glass">
                <div id="chat-v">
                    <div class="msg bot">مرحباً! أنا خبيرك الشرعي، اسألني ما شئت.</div>
                </div>
                <div style="display:flex; gap:8px;">
                    <input type="text" id="ai-q" placeholder="اسأل هنا..." style="flex:1; background:#05080a; border:1px solid #1e2530; color:white; padding:12px; border-radius:10px;">
                    <button onclick="askAI()" style="background:var(--accent); border:none; padding:12px; border-radius:10px;"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>

        <nav class="nav">
            <i class="fas fa-graduation-cap active" onclick="nav('learn', this)"></i>
            <i class="fas fa-robot" onclick="nav('ai', this)"></i>
            <i class="fas fa-user-cog" onclick="alert('قريباً: الإعدادات')"></i>
        </nav>
    </div>

    <script>
        // --- تهيئة Firebase ---
        const config = {
            apiKey: "AIzaSyDEab-wZCoMN7NPOprJfGTNfXihSPxxJIc",
            authDomain: "deen-5bf28.firebaseapp.com",
            projectId: "deen-5bf28",
            storageBucket: "deen-5bf28.firebasestorage.app",
            appId: "1:540844424438:web:6b2cdfefd0ca4ca83c80d7"
        };
        firebase.initializeApp(config);
        const auth = firebase.auth();

        // --- نظام تسجيل الدخول ---
        function doLogin(type) {
            let provider;
            switch(type) {
                case 'google': provider = new firebase.auth.GoogleAuthProvider(); break;
                case 'fb': provider = new firebase.auth.FacebookAuthProvider(); break;
                case 'github': provider = new firebase.auth.GithubAuthProvider(); break;
                case 'twitter': provider = new firebase.auth.TwitterAuthProvider(); break;
                // ملاحظة: Apple و Microsoft تتطلب إعدادات إضافية في لوحة تحكم Firebase
                default: provider = new firebase.auth.GoogleAuthProvider();
            }
            auth.signInWithPopup(provider).catch(e => alert("خطأ في تسجيل الدخول: " + e.message));
        }

        function doLogout() {
            auth.signOut().then(() => location.reload());
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('app-main').style.display = 'block';
                document.getElementById('user-display').innerText = "مرحباً " + user.displayName;
                renderBooks();
            } else {
                document.getElementById('auth-overlay').style.display = 'flex';
                document.getElementById('app-main').style.display = 'none';
            }
        });

        // --- الذكاء الاصطناعي (Groq) ---
        async function askAI() {
            const inp = document.getElementById('ai-q');
            const chat = document.getElementById('chat-v');
            if(!inp.value) return;
            document.getElementById('snd-click').play();

            const text = inp.value;
            chat.innerHTML += `<div class="msg user">${text}</div>`;
            inp.value = '';

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": "Bearer Gsk_7k40E9I8Z23qECQOXOxtWGdyb3FY5lCz89G3ZQjpEcXSSR85Fkfo", "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [{ role: "system", content: "أنت عالم شرعي مجيب بوقار." }, { role: "user", content: text }]
                    })
                });
                const d = await res.json();
                chat.innerHTML += `<div class="msg bot">${d.choices[0].message.content}</div>`;
            } catch(e) { chat.innerHTML += `<div class="msg bot">خطأ في الاتصال.</div>`; }
            chat.scrollTop = chat.scrollHeight;
        }

        // --- الأكاديمية والكتب ---
        let currentLvl = 1;
        let finished = [];
        const levels = {
            1: { name: "مبتدئ", books: [{id:"1", n:"الأصول الثلاثة", u:"https://ia800203.us.archive.org/21/items/waq63750/63750.pdf"}] },
            2: { name: "طالب علم", books: [{id:"2", n:"كتاب التوحيد", u:"https://ia801306.us.archive.org/16/items/waq466/466.pdf"}] }
        };

        function renderBooks() {
            const list = document.getElementById('books-list');
            const data = levels[currentLvl];
            document.getElementById('rank-name').innerText = data.name;
            list.innerHTML = data.books.map(b => `
                <div style="display:flex; justify-content:space-between; padding:10px; background:#1a1f26; border-radius:10px; margin-bottom:5px;">
                    <div><input type="checkbox" onchange="toggleB('${b.id}')"> ${b.n}</div>
                    <a href="${b.u}" target="_blank" style="color:var(--accent)"><i class="fas fa-file-pdf"></i></a>
                </div>
            `).join('');
        }

        function toggleB(id) {
            document.getElementById('snd-click').play();
            if(finished.includes(id)) finished = finished.filter(x => x!==id);
            else finished.push(id);
            document.getElementById('quiz-btn').style.display = (finished.length === levels[currentLvl].books.length) ? 'block' : 'none';
        }

        function openExam() {
            document.getElementById('snd-success').play();
            confetti();
            alert("مبارك النجاح! تم ترقيتك للمستوى التالي.");
            currentLvl++; finished = []; renderBooks();
        }

        function nav(p, el) {
            document.getElementById('snd-click').play();
            document.querySelectorAll('.page').forEach(pg => pg.style.display = 'none');
            document.getElementById('tab-'+p).style.display = 'block';
            document.querySelectorAll('.nav i').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
